# Pre-commit hooks for the AI-native SDLC (docs/AI_NATIVE_SDLC_DESIGN.md §9).
# These are mirrored as required CI checks — a local `--no-verify` cannot land
# non-compliant code because CI re-runs every gate.
#
#   install:  bash tooling/setup.sh   (or: pre-commit install --install-hooks)
#   run all:  pre-commit run --all-files

minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  # ── Hygiene ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  # ── Secret scanning (hard "never" rule) ──────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # ── Python: lint + format + types ────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        additional_dependencies: []
        pass_filenames: false
        args: ["--config-file", "pyproject.toml"]

  # ── JS/TS: lint + format ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, markdown, yaml]

  # ── IaC: format + security scan ──────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.1
    hooks:
      - id: terraform_fmt
      - id: terraform_tfsec

  # ── SAST on staged changes ───────────────────────────────────────────
  - repo: https://github.com/semgrep/semgrep
    rev: v1.83.0
    hooks:
      - id: semgrep
        args: ["--config", "p/ci", "--config", "p/secrets", "--error", "--skip-unknown-extensions"]

  # ── Conventional Commits (drives SemVer + changelog) ─────────────────
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
