# Pre-commit hooks for the AI-native SDLC (docs/AI_NATIVE_SDLC_DESIGN.md §9).
# These are mirrored as required CI checks — a local `--no-verify` cannot land
# non-compliant code because CI re-runs every gate.
#
#   install:  bash tooling/setup.sh   (or: pre-commit install --install-hooks)
#   run all:  pre-commit run --all-files

minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

# Pin Python-based hooks to 3.12 to match CI (actions/setup-python 3.12).
# Newer interpreters (e.g. 3.14) break pinned tools like semgrep v1.83.0.
default_language_version:
  python: python3.12

repos:
  # ── Hygiene ──────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  # ── Secret scanning (hard "never" rule) ──────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # ── Python: lint + format + types ────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        # mypy runs in its own isolated env, so the typed runtime deps of the
        # code under `files` must be declared here for imports to resolve.
        additional_dependencies:
          - "fastapi>=0.111"
          - "pydantic>=2.7"
          - "pydantic-settings>=2.3"
          - "mangum>=0.17"
          - "pytest>=8"
          - "httpx>=0.27"
          - "pyjwt[crypto]>=2.8"
        pass_filenames: false
        args: ["--config-file", "pyproject.toml"]

  # ── JS/TS: lint + format ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, markdown, yaml]

  # ── IaC: format ──────────────────────────────────────────────────────
  # IaC security scanning is enforced (blocking) in the CI "Security" job via
  # Trivy (misconfig) + Checkov; tfsec is EOL (absorbed into Trivy), so it is
  # intentionally not run here to avoid a dead binary dependency on every host.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.1
    hooks:
      - id: terraform_fmt

  # ── SAST on staged changes ───────────────────────────────────────────
  - repo: https://github.com/semgrep/semgrep
    rev: v1.83.0
    hooks:
      - id: semgrep
        # semgrep v1.83.0's vendored opentelemetry imports pkg_resources, which
        # is only present when setuptools is installed (removed from default
        # venvs in Python 3.12+). Pin <81 so pkg_resources still ships.
        additional_dependencies: ["setuptools<81"]
        args:
          [
            "--config",
            "p/ci",
            "--config",
            "p/secrets",
            "--error",
            "--skip-unknown-extensions",
          ]

  # ── Conventional Commits (drives SemVer + changelog) ─────────────────
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.16.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
