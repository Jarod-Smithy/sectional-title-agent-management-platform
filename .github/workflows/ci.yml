# Required, blocking CI gates for `main` (docs/AI_NATIVE_SDLC_DESIGN.md §10).
# The `gates` job is the single required status check that branch protection
# enforces; it depends on every other gate. Agents auto-merge only when this is green.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Force JS actions onto the Node 24 runtime. Our direct actions are already on
# Node-24 majors; this also opts in transitive actions (e.g. actions/cache@v4
# pinned inside pre-commit/action) so the Node 20 deprecation warnings clear.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, format, secrets, types, SAST (via pre-commit) ──────────────
  lint-format:
    name: Lint / Format / Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Run pre-commit (all hooks)
        uses: pre-commit/action@v3.0.1

  # ── Commit message convention (PR only) ──────────────────────────────
  commitlint:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install --no-save @commitlint/cli @commitlint/config-conventional
      - name: Validate PR commits
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.sha }}" --verbose

  # ── Python typecheck + unit (guarded: skips cleanly when no code yet) ─
  python:
    name: Python (typecheck + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for diff-cover (G5)
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Detect Python sources
        id: detect
        run: |
          if find services sdlc-agents eval -name '*.py' 2>/dev/null | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Python sources yet — gate passes (P0 skeleton)."
          fi
      - name: Install tooling
        if: steps.detect.outputs.present == 'true'
        run: python -m pip install ruff mypy pytest pytest-cov diff-cover
      - name: Install app packages (so mypy/pytest resolve real imports)
        if: steps.detect.outputs.present == 'true'
        # The CI image has none of the app runtime deps. Installing the API
        # package (+ its dev extras: httpx for TestClient, etc.) lets strict
        # mypy and pytest resolve fastapi/mangum/pydantic instead of erroring
        # with import-not-found / untyped-decorator.
        run: python -m pip install -e "services/api[dev]"
      - name: Mypy (strict)
        if: steps.detect.outputs.present == 'true'
        run: mypy
      - name: Pytest + coverage
        if: steps.detect.outputs.present == 'true'
        run: pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Diff coverage (changed lines must stay covered — G5)
        if: steps.detect.outputs.present == 'true' && github.event_name == 'pull_request'
        # Changed lines must be FULLY covered. The bootstrap relaxation
        # (fail-under=90 for the foundational mega-PR) is retired now the
        # codebase is in place: every new change ships with its own tests, so
        # agent-authored code cannot land without exercising what it adds.
        run: |
          diff-cover coverage.xml \
            --compare-branch "origin/${{ github.event.pull_request.base.ref }}" \
            --fail-under=100

  # ── Node typecheck + unit (guarded) ──────────────────────────────────
  node:
    name: Node (typecheck + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Detect TS sources
        id: detect
        run: |
          if find frontend services sdlc-agents -name '*.ts' -o -name '*.tsx' 2>/dev/null | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No TS sources yet — gate passes (P0 skeleton)."
          fi
      - name: Install
        if: steps.detect.outputs.present == 'true'
        run: npm ci || npm install
      - name: Typecheck
        if: steps.detect.outputs.present == 'true'
        run: npm run typecheck --if-present
      - name: Unit tests
        if: steps.detect.outputs.present == 'true'
        run: npm test --if-present

  # ── Security (BLOCKING): SAST, deps/containers, secrets, IaC ─────────
  security:
    name: Security (SAST / SCA / Secrets / IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: gitleaks (full-history secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Semgrep (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/ci
            p/secrets
            p/owasp-top-ten

      - name: "Trivy (filesystem: deps + secrets)"
        # IaC misconfig scanning is owned by Checkov (below) to avoid double
        # gating; Trivy stays strict on dependency vulns + secrets.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Checkov (IaC)
        # BOOTSTRAP (temporary): soft_fail reports IaC findings without blocking
        # the foundational infra PR. Re-tighten to soft_fail:false in the
        # infra-hardening follow-up once baseline findings are triaged.
        uses: bridgecrewio/checkov-action@v12
        with:
          quiet: true
          soft_fail: true
          framework: terraform,cloudformation,dockerfile

  # ── Policy-as-code (BLOCKING): Conftest/OPA org guardrails on Terraform ──
  policy:
    name: Policy (Conftest / OPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install conftest
        run: |
          CONFTEST_VERSION=0.56.0
          curl -fsSL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest
          conftest --version
      - name: Verify policy unit tests
        # Runs the rego tests under policy/ (terraform_test.rego). Strict.
        run: conftest verify --policy policy
      - name: Detect Terraform plan support
        id: detect
        run: |
          # infra/ is a Terragrunt multi-stack tree with no flat root, so a
          # single `terraform plan` cannot render it. Plan-based conftest
          # arrives in a follow-up with per-stack terragrunt rendering
          # (tracked as the policy-plan hardening item). Unit tests above
          # still enforce the rego rules on every PR.
          echo "present=false" >> "$GITHUB_OUTPUT"
      - name: Render Terraform plan to JSON
        if: steps.detect.outputs.present == 'true'
        run: |
          cd infra
          terraform init -backend=false
          terraform plan -out=tfplan.bin
          terraform show -json tfplan.bin > tfplan.json
      - name: Conftest test plan against org policy
        if: steps.detect.outputs.present == 'true'
        run: conftest test infra/tfplan.json --policy policy

  # ── Diff-size budget (BLOCKING on PRs): cap files/lines per change (G12) ──
  diff-budget:
    name: Diff-size budget
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check diff budget
        if: "!contains(github.event.pull_request.labels.*.name, 'oversized-change-approved')"
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref }}"
          bash tooling/check-diff-budget.sh "origin/${{ github.event.pull_request.base.ref }}" HEAD

  # ── Eval gate (BLOCKING once eval harness exists) ────────────────────
  eval:
    name: Agent Eval Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Detect eval harness
        id: detect
        run: |
          if [ -f eval/run_eval.py ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Eval harness not implemented yet (arrives in P2/P3) — gate passes for P0."
          fi
      - name: Set up Python
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run golden-set eval
        if: steps.detect.outputs.present == 'true'
        run: |
          python -m pip install -r eval/requirements.txt
          python eval/run_eval.py --ci

  # ── Single required status check for branch protection ───────────────
  gates:
    name: All gates
    if: always()
    needs:
      [
        lint-format,
        commitlint,
        python,
        node,
        security,
        policy,
        diff-budget,
        eval,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required gates passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          # commitlint is skipped on push to main; treat 'skipped' as acceptable.
          echo "$results" | python3 -c "
          import json,sys
          needs=json.load(sys.stdin)
          bad=[k for k,v in needs.items() if v['result'] not in ('success','skipped')]
          if bad:
              print('FAILED gates:', bad); sys.exit(1)
          print('All gates green.')
          "
