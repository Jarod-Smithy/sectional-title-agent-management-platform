name: Feature request
description: A new capability or enhancement. Submitted by an admin from the in-app Dev Console or directly.
title: "[feature]: "
labels: ["enhancement", "sdlc:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Fields map 1:1 to the in-app Dev Console submit form (docs/AI_NATIVE_SDLC_DESIGN.md §8).
        The Triage agent turns this into acceptance criteria before any code is written.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One line describing the feature.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user need or pain does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: What should happen? Describe the desired outcome, not the implementation.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria (optional)
      description: If known. The Triage agent will otherwise draft these for confirmation.
      placeholder: |
        - [ ] …
        - [ ] …
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ["low", "medium", "high"]
      default: 1
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        [
          "frontend",
          "services",
          "sdlc-agents",
          "infra",
          "knowledge-base",
          "unknown",
        ]
      default: 5
  - type: input
    id: source
    attributes:
      label: Submitted via
      value: dev-console
